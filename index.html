<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Motor Pedagógico PBA</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #f0f4f8;
      color: #1a202c;
      min-height: 100vh;
    }

    header {
      background: #2b6cb0;
      color: white;
      padding: 1.5rem 2rem;
    }

    header h1 {
      font-size: 1.5rem;
      font-weight: 700;
    }

    header p {
      font-size: 0.9rem;
      opacity: 0.85;
      margin-top: 0.25rem;
    }

    main {
      max-width: 800px;
      margin: 2rem auto;
      padding: 0 1rem;
    }

    .selector-card {
      background: white;
      border-radius: 12px;
      padding: 1.5rem;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
      margin-bottom: 1.5rem;
    }

    .selector-card h2 {
      font-size: 1rem;
      font-weight: 600;
      color: #2d3748;
      margin-bottom: 1rem;
    }

    .selects-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin-bottom: 1rem;
    }

    @media (max-width: 500px) {
      .selects-row { grid-template-columns: 1fr; }
    }

    label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: #4a5568;
      margin-bottom: 0.35rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    select {
      width: 100%;
      padding: 0.6rem 0.75rem;
      border: 1px solid #cbd5e0;
      border-radius: 8px;
      font-size: 0.95rem;
      color: #2d3748;
      background: white;
      cursor: pointer;
    }

    select:disabled {
      background: #f7fafc;
      color: #a0aec0;
      cursor: not-allowed;
    }

    select:focus {
      outline: none;
      border-color: #2b6cb0;
      box-shadow: 0 0 0 3px rgba(43,108,176,0.15);
    }

    .contenido-select {
      margin-bottom: 1rem;
    }

    #btn-generar {
      width: 100%;
      padding: 0.8rem;
      background: #2b6cb0;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    #btn-generar:hover:not(:disabled) { background: #2c5282; }

    #btn-generar:disabled {
      background: #a0aec0;
      cursor: not-allowed;
    }

    .recurso-card {
      background: white;
      border-radius: 12px;
      padding: 1.5rem;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
      display: none;
    }

    .recurso-card.visible { display: block; }

    .recurso-titulo {
      font-size: 1.25rem;
      font-weight: 700;
      color: #2b6cb0;
      margin-bottom: 1.25rem;
      padding-bottom: 0.75rem;
      border-bottom: 2px solid #ebf4ff;
    }

    .recurso-seccion {
      margin-bottom: 1.25rem;
    }

    .recurso-seccion:last-child { margin-bottom: 0; }

    .seccion-label {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #718096;
      margin-bottom: 0.4rem;
    }

    .seccion-label span {
      margin-right: 0.35rem;
    }

    .seccion-contenido {
      font-size: 0.95rem;
      line-height: 1.65;
      color: #2d3748;
    }

    .explicacion .seccion-label { color: #2f855a; }
    .ejemplo .seccion-label { color: #c05621; }
    .actividad .seccion-label { color: #553c9a; }

    .loading {
      text-align: center;
      padding: 2rem;
      color: #718096;
      display: none;
    }

    .loading.visible { display: block; }

    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid #e2e8f0;
      border-top-color: #2b6cb0;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 1rem;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .error {
      background: #fff5f5;
      border: 1px solid #fc8181;
      border-radius: 8px;
      padding: 1rem;
      color: #c53030;
      font-size: 0.9rem;
      display: none;
    }

    .error.visible { display: block; }
  </style>
</head>
<body>

<header>
  <h1>Motor Pedagógico PBA</h1>
  <p>Recursos educativos para el Diseño Curricular de la Provincia de Buenos Aires</p>
</header>

<main>
  <div class="selector-card">
    <h2>Seleccioná el contenido</h2>

    <div class="selects-row">
      <div>
        <label for="sel-grado">Grado</label>
        <select id="sel-grado">
          <option value="">— Grado —</option>
        </select>
      </div>
      <div>
        <label for="sel-area">Área</label>
        <select id="sel-area" disabled>
          <option value="">— Área —</option>
        </select>
      </div>
    </div>

    <div class="selects-row">
      <div>
        <label for="sel-bloque">Bloque</label>
        <select id="sel-bloque" disabled>
          <option value="">— Bloque —</option>
        </select>
      </div>
      <div><!-- spacer --></div>
    </div>

    <div class="contenido-select">
      <label for="sel-contenido">Contenido</label>
      <select id="sel-contenido" disabled>
        <option value="">— Contenido —</option>
      </select>
    </div>

    <button id="btn-generar" disabled>Generar recurso educativo</button>
  </div>

  <div class="loading" id="loading">
    <div class="spinner"></div>
    <p>Generando recurso educativo...</p>
  </div>

  <div class="error" id="error"></div>

  <div class="recurso-card" id="recurso-card">
    <div class="recurso-titulo" id="recurso-titulo"></div>

    <div class="recurso-seccion explicacion">
      <div class="seccion-label"><span>📖</span>Explicación</div>
      <div class="seccion-contenido" id="recurso-explicacion"></div>
    </div>

    <div class="recurso-seccion ejemplo">
      <div class="seccion-label"><span>💡</span>Ejemplo</div>
      <div class="seccion-contenido" id="recurso-ejemplo"></div>
    </div>

    <div class="recurso-seccion actividad">
      <div class="seccion-label"><span>✏️</span>Actividad</div>
      <div class="seccion-contenido" id="recurso-actividad"></div>
    </div>
  </div>
</main>

<script>
  let curricular = [];

  // Cargar datos
  fetch('/dc_pba_base_curricular_corregida.json')
    .then(r => r.json())
    .then(data => {
      curricular = data;
      poblarGrados();
    });

  const selGrado    = document.getElementById('sel-grado');
  const selArea     = document.getElementById('sel-area');
  const selBloque   = document.getElementById('sel-bloque');
  const selContenido = document.getElementById('sel-contenido');
  const btnGenerar  = document.getElementById('btn-generar');

  function poblarGrados() {
    const grados = [...new Set(curricular.map(r => r.grado))].sort((a,b) => a-b);
    grados.forEach(g => {
      const opt = new Option(`${g}° grado`, g);
      selGrado.add(opt);
    });
  }

  function poblarAreas() {
    const grado = selGrado.value;
    const areas = [...new Set(curricular.filter(r => r.grado === grado).map(r => r.area))].sort();
    selArea.innerHTML = '<option value="">— Área —</option>';
    areas.forEach(a => selArea.add(new Option(a, a)));
    selArea.disabled = false;
    selBloque.innerHTML = '<option value="">— Bloque —</option>';
    selBloque.disabled = true;
    selContenido.innerHTML = '<option value="">— Contenido —</option>';
    selContenido.disabled = true;
    btnGenerar.disabled = true;
  }

  function poblarBloques() {
    const { grado, area } = getSeleccion();
    const bloques = [...new Set(
      curricular.filter(r => r.grado === grado && r.area === area).map(r => r.bloque)
    )].sort();
    selBloque.innerHTML = '<option value="">— Bloque —</option>';
    bloques.forEach(b => selBloque.add(new Option(b, b)));
    selBloque.disabled = false;
    selContenido.innerHTML = '<option value="">— Contenido —</option>';
    selContenido.disabled = true;
    btnGenerar.disabled = true;
  }

  function poblarContenidos() {
    const { grado, area, bloque } = getSeleccion();
    const items = curricular.filter(r => r.grado === grado && r.area === area && r.bloque === bloque);
    selContenido.innerHTML = '<option value="">— Contenido —</option>';
    items.forEach(r => selContenido.add(new Option(r.item_original, r.id)));
    selContenido.disabled = false;
    btnGenerar.disabled = true;
  }

  function getSeleccion() {
    return {
      grado: selGrado.value,
      area: selArea.value,
      bloque: selBloque.value,
      id: selContenido.value,
    };
  }

  selGrado.addEventListener('change', () => { if (selGrado.value) poblarAreas(); });
  selArea.addEventListener('change', () => { if (selArea.value) poblarBloques(); });
  selBloque.addEventListener('change', () => { if (selBloque.value) poblarContenidos(); });
  selContenido.addEventListener('change', () => { btnGenerar.disabled = !selContenido.value; });

  btnGenerar.addEventListener('click', async () => {
    const { id } = getSeleccion();
    const registro = curricular.find(r => r.id === id);
    if (!registro) return;

    mostrarEstado('loading');

    try {
      const res = await fetch('/api/generate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          grado: registro.grado,
          area: registro.area,
          bloque: registro.bloque,
          item: registro.item_original,
          objetivo: registro.objetivo,
        }),
      });

      if (!res.ok) throw new Error('Error en la respuesta del servidor');

      const recurso = await res.json();
      mostrarRecurso(recurso);
    } catch (err) {
      mostrarError('No se pudo generar el recurso. Verificá tu conexión e intentá de nuevo.');
    }
  });

  function mostrarEstado(estado) {
    document.getElementById('loading').classList.toggle('visible', estado === 'loading');
    document.getElementById('error').classList.remove('visible');
    document.getElementById('recurso-card').classList.remove('visible');
  }

  function mostrarRecurso(r) {
    document.getElementById('loading').classList.remove('visible');
    document.getElementById('recurso-titulo').textContent = r.titulo;
    document.getElementById('recurso-explicacion').textContent = r.explicacion;
    document.getElementById('recurso-ejemplo').textContent = r.ejemplo;
    document.getElementById('recurso-actividad').textContent = r.actividad;
    document.getElementById('recurso-card').classList.add('visible');
    document.getElementById('recurso-card').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function mostrarError(msg) {
    document.getElementById('loading').classList.remove('visible');
    const el = document.getElementById('error');
    el.textContent = msg;
    el.classList.add('visible');
  }
</script>

</body>
</html>
